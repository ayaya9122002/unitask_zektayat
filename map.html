<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خريطة ذكريات السفر</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 500px;
            width: 100%;
            border-radius: 20px;
            margin-top: 20px;
        }
        .map-container {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ خريطة ذكريات سفري</h1>
        <div class="map-container">
            <div id="map"></div>
        </div>
        <button onclick="window.location.href='index.html'" class="btn-primary">🏠 العودة للرئيسية</button>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
