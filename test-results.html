<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختبارات مشروع ذكريات السفر</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }
        h1 { color: #f5c2e7; text-align: center; }
        h2 { color: #89b4fa; margin-top: 30px; border-bottom: 1px solid #45475a; padding-bottom: 5px; }
        .pass { background: #a6e3a1; color: #1e1e2e; padding: 10px; margin: 8px 0; border-radius: 8px; font-weight: bold; }
        .fail { background: #f38ba8; color: #1e1e2e; padding: 10px; margin: 8px 0; border-radius: 8px; font-weight: bold; }
        .summary { background: #cba6f7; color: #1e1e2e; padding: 15px; text-align: center; font-size: 20px; border-radius: 12px; margin: 20px 0; }
        .story { color: #fab387; }
        code { background: #313244; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>🧪 اختبارات منطق مشروع "ذكريات السفر"</h1>
    <p style="text-align:center">مطابق للصورة: ❌ مدخل خاطئ = false | ✅ مدخل صحيح = true</p>

    <div id="results"></div>

    <script>
        // ==========================================
        // دوال التحقق (نفس منطق مشروعك الحقيقي)
        // ==========================================
        function validateMemory(description, photo) {
            if (!description || description.trim() === '') return false;
            if (!photo || photo.trim() === '' || !photo.includes('.')) return false;
            return true;
        }

        function canDeleteMemory(memoryId) {
            if (!memoryId || typeof memoryId !== 'string') return false;
            return true;
        }

        function canLikeMemory(memoryId, alreadyLiked = []) {
            if (!memoryId) return false;
            if (alreadyLiked.includes(memoryId)) return false;
            return true;
        }

        function validateCategory(category) {
            if (!category || category.trim() === '') return false;
            return true;
        }

        function validateCoordinates(lat, lng) {
            if (lat === null || lng === null || lat === undefined || lng === undefined) return false;
            if (typeof lat !== 'number' || typeof lng !== 'number') return false;
            return true;
        }

        // ==========================================
        // نظام الاختبارات البسيط
        // ==========================================
        let total = 0, passed = 0, failed = 0;
        let output = '';

        function test(story, name, actual, expected) {
            total++;
            const icon = actual === expected ? '✅' : '❌';
            const cssClass = actual === expected ? 'pass' : 'fail';
            if (actual === expected) passed++; else failed++;
            output += `<div class="${cssClass}">${icon} <span class="story">${story}</span> | ${name}: توقعنا <code>${expected}</code> وحصلنا <code>${actual}</code></div>`;
        }

        // ==========================================
        // تنفيذ الاختبارات
        // ==========================================
        test('SCRUM-7', 'وصف الذكرى فارغ ➔ false', validateMemory('', 'img.jpg'), false);
        test('SCRUM-7', 'صورة بدون امتداد ➔ false', validateMemory('ذكرى', ''), false);
        test('SCRUM-7', 'وصف وصورة صحيحان ➔ true', validateMemory('برج إيفل', 'paris.jpg'), true);

        test('SCRUM-8', 'حذف بدون ID ➔ false', canDeleteMemory(null), false);
        test('SCRUM-8', 'حذف ID صحيح ➔ true', canDeleteMemory('mem-123'), true);

        test('SCRUM-9', 'تصنيف فارغ ➔ false', validateCategory(''), false);
        test('SCRUM-9', 'تصنيف "مطاعم" ➔ true', validateCategory('مطاعم'), true);
        test('SCRUM-9', 'تصنيف "معالم سياحية" ➔ true', validateCategory('معالم سياحية'), true);

        test('SCRUM-10', 'إعجاب بدون ID ➔ false', canLikeMemory(null), false);
        test('SCRUM-10', 'إعجاب مكرر ➔ false', canLikeMemory('mem-456', ['mem-456']), false);
        test('SCRUM-10', 'إعجاب أول مرة ➔ true', canLikeMemory('mem-456', []), true);

        test('MAP', 'إحداثيات فارغة ➔ false', validateCoordinates(null, null), false);
        test('MAP', 'إحداثيات باريس الصحيحة ➔ true', validateCoordinates(48.85, 2.35), true);

        // عرض النتيجة
        const summaryHTML = `<div class="summary">📊 النتيجة: ${passed} نجح ✅ | ${failed} فشل ❌ | ${total} اختبار كلي</div>`;
        document.getElementById('results').innerHTML = summaryHTML + output;
    </script>

</body>
</html>
