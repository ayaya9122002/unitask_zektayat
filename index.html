<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ذكريات السفر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧳 ذكريات سفري</h1>

        <!-- نموذج الإضافة -->
        <div class="form-card">
            <h2>➕ أضف ذكرى جديدة</h2>
            <input type="text" id="memoryTitle" placeholder="عنوان الذكرى...">
            <textarea id="memoryDesc" placeholder="وصف الذكرى..."></textarea>
            <!-- قائمة التصنيف -->
<div class="category-select">
    <label>🏷️ تصنيف الذكرى:</label>
    <select id="memoryCategory">
        <option value="سفر">✈️ سفر</option>
        <option value="أكل">🍕 أكل</option>
        <option value="مغامرة">⛰️ مغامرة</option>
        <option value="أصدقاء">👭 أصدقاء</option>
        <option value="عائلة">👨‍👩‍👧‍👦 عائلة</option>
    </select>
</div>
            
            <div class="file-input">
                <button type="button" class="btn-secondary" onclick="document.getElementById('memoryImage').click()">📸 اختيار صورة</button>
                <input type="file" id="memoryImage" accept="image/*" style="display:none">
                <span id="fileName" class="file-name">لم يتم اختيار ملف</span>
            </div>

            <input type="text" id="memoryLocation" placeholder="📍 اسم المكان (مثال: برج إيفل، باريس)" style="margin-bottom: 15px;">
            
            <button class="btn-primary" onclick="addMemory()">💾 حفظ الذكرى</button>
        </div>

        <!-- عرض الذكريات (بطاقات) -->
        <div class="memories-section">
            <h2>📸 ذكرياتي</h2>
            <div id="memoriesGrid" class="memories-grid"></div>
            <button onclick="window.location.href='map.html'" class="btn-primary" style="margin-top:20px;">🗺️ عرض الذكريات على الخريطة</button>
        </div>

        <!-- القائمة المنسدلة للحذف (تحت البطاقات) -->
        <div class="delete-card">
            <h2>🗑 حذف ذكرى</h2>
            <div class="delete-controls">
                <select id="deleteSelect">
                    <option value="">-- اختاري ذكرى للحذف --</option>
                </select>
                <button class="btn-danger" onclick="deleteSelectedMemory()">🗑 حذف</button>
            </div>
        </div>
    </div>

    <script src="geocode.js"></script>
    <script src="script.js"></script>
    <script src="script.js"></script>
</body>
</html>
